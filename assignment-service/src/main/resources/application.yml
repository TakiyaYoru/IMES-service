server:
  port: 8085

spring:
  application:
    name: assignment-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/imes_db}
    username: ${SPRING_DATASOURCE_USERNAME:imes_user}
    password: ${SPRING_DATASOURCE_PASSWORD:imes_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  liquibase:
    enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Security
jwt:
  secret: ${JWT_SECRET:imes-secret-key-for-jwt-token-generation-minimum-256-bits-required}
  expiration: 86400000

# Eureka Client
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
    registerWithEureka: true
    fetchRegistry: true
  instance:
    preferIpAddress: true
    instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.imes: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

imes:
  file-upload:
    base-dir: ${IMES_UPLOAD_BASE_DIR:/tmp/imes/uploads}
    max-size-bytes: 10485760
    allowed-types: pdf,doc,docx,zip,jpg,jpeg,png
