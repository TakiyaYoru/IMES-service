spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/imes_db
    username: imes_user
    password: imes_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  liquibase:
    enabled: false

  # Email Configuration (Gmail SMTP - for development)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    from: ${MAIL_FROM:noreply@imes.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8081

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true
    org.springframework.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Application Configuration
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

# JWT Configuration
jwt:
  secret: IMESSecretKeyForJWTTokenGenerationAndValidation2024SecureKey
  expiration: 86400000

imes:
  jwt:
    secret: IMESSecretKeyForJWTTokenGenerationAndValidation2024SecureKey
    expiration: 86400000

logging:
  level:
    com.imes: DEBUG
    org.springframework.cloud: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
