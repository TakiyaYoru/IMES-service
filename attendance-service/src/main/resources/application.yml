spring:
  application:
    name: attendance-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/imes_db
    username: imes_user
    password: imes_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  liquibase:
    enabled: false

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

jwt:
  secret: your-256-bit-secret-key-here-make-it-long-enough-for-hs256-algorithm
  expiration: 86400000

imes:
  jwt:
    secret: your-256-bit-secret-key-here-make-it-long-enough-for-hs256-algorithm
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
